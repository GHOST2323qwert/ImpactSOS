plugins {
    id 'com.android.application'
}

android {
    namespace 'com.impactsos.app'
    compileSdk 34

    defaultConfig {
        applicationId "com.impactsos.app"
        minSdk 24
        targetSdk 34
        versionCode 1
        versionName "1.0"
    }

    buildTypes {
        debug {
            debuggable true
        }
    }
}

dependencies {
    implementation 'androidx.appcompat:appcompat:1.6.1'
}
